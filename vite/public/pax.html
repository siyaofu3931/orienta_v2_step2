<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
<title>Air China · 消息</title>
<style>
  /* Air China portal–style: light gray field + 国航红 (cf. airchina.com) */
  :root {
    --ac-red: #c8102e;
    --ac-red-dark: #a30d25;
    --page: linear-gradient(180deg, #f7f8fb 0%, #eceff4 50%, #e2e6ed 100%);
    --surface: #ffffff;
    --text: #1a1a1a;
    --muted: #6b7280;
    --line: #dce0e6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; height: -webkit-fill-available; }
  html, body { height: 100%; max-height: 100dvh; overflow: hidden; overscroll-behavior: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
    background: var(--page);
    border-top: 4px solid var(--ac-red);
    min-height: 100%;
    min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (max-width: 520px), (max-height: 720px) {
    .brand-logo { height: 48px; max-width: min(240px, 82vw); }
    .brand-bar { padding: 8px 12px 6px; }
    .view-tabs { padding: 6px 10px; gap: 6px; }
    .view-tab { padding: 8px 10px; font-size: 13px; }
    .panel-video .video-hint { padding: 6px 12px; font-size: 10px; line-height: 1.35; }
  }
  .brand-bar { display: flex; justify-content: flex-start; align-items: center; padding: 12px 16px 10px; background: var(--surface); border-bottom: 1px solid var(--line); flex-shrink: 0; box-shadow: 0 1px 0 rgba(255,255,255,0.9); }
  .brand-logo { height: 76px; width: auto; max-width: min(380px, 88vw); object-fit: contain; display: block; }
  .view-tabs { display: flex; gap: 8px; padding: 10px 16px; background: rgba(255,255,255,0.65); border-bottom: 1px solid var(--line); flex-shrink: 0; }
  .view-tab {
    flex: 1; border: 1px solid var(--line); background: var(--surface); color: var(--muted);
    border-radius: 10px; padding: 10px 12px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .view-tab.active { background: var(--ac-red); color: #fff; border-color: var(--ac-red-dark); }
  .panel-chat { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
  .panel-video { flex: 1; min-height: 0; display: none; flex-direction: column; overflow: hidden; background: #eef0f4; }
  .video-hint { flex-shrink: 0; padding: 10px 16px; font-size: 11px; color: var(--muted); line-height: 1.45; border-bottom: 1px solid var(--line); background: var(--surface); }
  .route-video-line { color: var(--text); font-weight: 700; }
  .video-frame-wrap { flex: 1; min-height: 0; position: relative; }
  .video-frame-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #111; }
  .hdr { padding: 12px 16px 10px; background: var(--surface); border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
  .hdr-title { font-size: 17px; font-weight: 700; }
  .hdr-sub { font-size: 12px; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #c4c8ce; flex-shrink: 0; }
  .dot.online { background: #2e9d4f; }
  .info-strip { padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--line); display: flex; gap: 16px; flex-wrap: wrap; }
  .info-item { font-size: 12px; }
  .info-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .info-val { font-weight: 600; margin-top: 1px; }
  .gate-val { color: var(--ac-red); font-size: 16px; font-weight: 800; }
  .msgs { flex: 1; min-height: 0; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .msg { display: flex; flex-direction: column; }
  .msg.right { align-items: flex-end; }
  .msg.left  { align-items: flex-start; }
  .msg-meta { font-size: 10px; color: #8b919c; margin-bottom: 2px; }
  .bubble { max-width: 78%; padding: 8px 12px; border-radius: 16px; font-size: 14px; line-height: 1.4; word-break: break-word; }
  .bubble.pax    { background: var(--ac-red); color: #fff; border-bottom-right-radius: 4px; }
  .bubble.admin  { background: #e8eaef; color: var(--text); border: 1px solid var(--line); border-bottom-left-radius: 4px; }
  .bubble.agent  { background: #f0f4fa; color: #1e3a5f; border: 1px solid #c5d4e8; border-bottom-left-radius: 4px; }
  .bubble.system { background: #fff8e6; color: #8a5b00; font-style: italic; border-radius: 8px; border: 1px solid #f0e0b2; }
  .input-area { padding: 10px 16px 20px; background: var(--surface); border-top: 1px solid var(--line); display: flex; gap: 8px; }
  .input-area textarea { flex: 1; background: #f3f4f6; border: 1px solid var(--line); border-radius: 20px; color: var(--text); font-size: 15px; padding: 8px 14px; resize: none; height: 40px; line-height: 1.4; }
  .btn-send { background: var(--ac-red); color: #fff; border: none; border-radius: 20px; padding: 0 18px; font-size: 15px; font-weight: 600; cursor: pointer; height: 40px; white-space: nowrap; }
  .btn-send:disabled { opacity: 0.4; }
  .notify-banner { margin: 8px 16px; padding: 10px 14px; background: #fff5f5; border: 1px solid rgba(200,16,46,0.22); border-radius: 10px; font-size: 13px; color: #4a1518; }
  .notify-banner .dismiss { float: right; cursor: pointer; opacity: 0.6; font-size: 16px; margin-left: 8px; }
  .status-row { padding: 0 16px 6px; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); background: transparent; }
  .loc-btn { background: var(--surface); color: var(--text); border: 1px solid var(--line); border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
</style>
</head>
<body>

<div class="brand-bar">
  <img class="brand-logo" src="/airchina-logo.png" alt="Air China" />
</div>

<div class="view-tabs" role="tablist" aria-label="主视图">
  <button type="button" class="view-tab active" id="tabChat" role="tab" aria-selected="true" aria-controls="panelChat">对话</button>
  <button type="button" class="view-tab" id="tabVideo" role="tab" aria-selected="false" aria-controls="panelVideo">视频页</button>
</div>

<div id="panelChat" class="panel-chat">
<div class="hdr">
  <div class="dot" id="connDot"></div>
  <div>
    <div class="hdr-title" id="paxName">Loading…</div>
    <div class="hdr-sub" id="paxSub"></div>
  </div>
</div>

<div class="info-strip" id="infoStrip" style="display:none">
  <div class="info-item">
    <div class="info-label">Inbound</div>
    <div class="info-val" id="infoInbound">—</div>
  </div>
  <div class="info-item">
    <div class="info-label">Outbound</div>
    <div class="info-val" id="infoOutbound">—</div>
  </div>
  <div class="info-item">
    <div class="info-label">Gate</div>
    <div class="gate-val" id="infoGate">—</div>
  </div>
  <div class="info-item">
    <div class="info-label">Status</div>
    <div class="info-val" id="infoStatus">—</div>
  </div>
</div>

<div id="notifyBanners"></div>

<div class="msgs" id="msgs">
  <div style="text-align:center;color:#6b7280;font-size:13px;margin-top:20px">
    Air China 智能中转 · Orienta Transfer Assist<br>
    <span id="premiumNote" style="font-size:11px;margin-top:4px;display:block"></span>
  </div>
</div>

<div class="status-row">
  <span id="locStatus">Location: —</span>
  <button class="loc-btn" id="locBtn" onclick="shareLocation()">📍 Share Location</button>
</div>

<div class="input-area" id="inputArea" style="display:none">
  <textarea id="msgInput" placeholder="Type a message…" rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
  <button class="btn-send" id="sendBtn" onclick="sendMsg()">Send</button>
</div>
</div>

<div id="panelVideo" class="panel-video" role="tabpanel" aria-labelledby="tabVideo">
  <div class="video-hint" id="videoHintTop">
    <div id="routeVideoLine" class="route-video-line" style="display:none;margin-bottom:6px;font-size:13px"></div>
    <span id="videoHintBody"></span>
  </div>
  <div class="video-frame-wrap">
    <iframe title="室内路线视频" id="routeSiteFrame" src="about:blank"></iframe>
  </div>
</div>

<script>
function resolveCanonicalPassengerId(raw) {
  const s = (raw || "").trim();
  if (!s) return "";
  var m = { DA8X3: "TX1", DB5K7: "TX3", DC2N9: "TX2" };
  return m[s.toUpperCase()] || s;
}
const params = new URLSearchParams(location.search);
const tenantId   = params.get("tenant") || "airchina";
const passengerId =
  resolveCanonicalPassengerId(params.get("pax") || params.get("pid") || params.get("pix") || "") ||
  (params.get("pax") || params.get("pid") || params.get("pix") || "");
const __isP11 = String(passengerId || "").toUpperCase() === "P11";
const __cameFromFlight = params.get("fromFlight") === "1";
const hubFromQuery = (params.get("hub") || params.get("airport") || "").trim().toUpperCase();
/** 与 pax-flight 抵达/出发机场一致：默认国航租户走 PEK 室内资源 */
const routeSiteAirport = hubFromQuery || (tenantId === "airchina" ? "PEK" : "SFO");

function parseSpawnPoint() {
  const la = params.get("spawnLat");
  const ln = params.get("spawnLng");
  if (la && ln) {
    const lat = parseFloat(la);
    const lng = parseFloat(ln);
    if (Number.isFinite(lat) && Number.isFinite(lng)) return { lat, lng };
  }
  if (params.get("lounge") === "1" || params.get("spawn") === "lounge") {
    return { lat: 40.077095, lng: 116.606151 };
  }
  return null;
}
const spawnPoint = parseSpawnPoint();

// P11 lounge policy: require login + transfer before reaching pax.html.
// If someone opens pax.html directly for P11 (QR/deep link), bounce to /pax entry.
if (__isP11 && !__cameFromFlight) {
  const back = new URL("/pax", location.origin);
  back.searchParams.set("tenant", tenantId);
  back.searchParams.set("pid", "P11");
  if (spawnPoint) {
    back.searchParams.set("spawnLat", String(spawnPoint.lat));
    back.searchParams.set("spawnLng", String(spawnPoint.lng));
  } else if (params.get("lounge") === "1" || params.get("spawn") === "lounge") {
    back.searchParams.set("lounge", "1");
  }
  location.replace(back.pathname + "?" + back.searchParams.toString());
}

const gateFromNav = (params.get("gateFrom") || "").trim();
const gateToNav = (params.get("gateTo") || "").trim();
const demoGateByPassenger = {
  TX1: { from: "E16", to: "E19" },
  TX2: { from: "E18", to: "E19" },
  TX3: { from: "E17", to: "E19" },
};
const demoPair = demoGateByPassenger[String(passengerId || "").toUpperCase()];
const effectiveGateFrom = demoPair ? demoPair.from : gateFromNav;
const effectiveGateTo = demoPair ? demoPair.to : gateToNav;
(function initRouteVideoLine() {
  const el = document.getElementById("routeVideoLine");
  if (!el) return;
  if (effectiveGateFrom && effectiveGateTo) {
    el.textContent = "抵达登机口 " + effectiveGateFrom + " → 出发登机口 " + effectiveGateTo;
    el.style.display = "block";
  }
})();

function buildRouteSiteIframeSrc() {
  let src =
    "/route_site/index.html?airport=" +
    encodeURIComponent(routeSiteAirport) +
    "&tenant=" +
    encodeURIComponent(tenantId) +
    "&pax=" +
    encodeURIComponent(passengerId);
  if (effectiveGateFrom && effectiveGateTo) {
    src +=
      "&gateFrom=" +
      encodeURIComponent(effectiveGateFrom) +
      "&gateTo=" +
      encodeURIComponent(effectiveGateTo);
  }

  // Demo mode: keep PEK video running through intermediate gate checkpoints.
  const autoGate = (params.get("autoGate") || "").toString().trim();
  if (autoGate === "1") {
    src += "&autoGate=1";
  }
  const pdrLat = params.get("pdrOriginLat") || params.get("pdrLat");
  const pdrLng = params.get("pdrOriginLng") || params.get("pdrLng");
  if (pdrLat && pdrLng) {
    src +=
      "&pdrOriginLat=" +
      encodeURIComponent(pdrLat) +
      "&pdrOriginLng=" +
      encodeURIComponent(pdrLng);
  }
  return src;
}

function pingRouteSiteTouristPush() {
  const iframe = document.getElementById("routeSiteFrame");
  if (!iframe || !iframe.contentWindow) return;
  try {
    iframe.contentWindow.postMessage({ type: "orienta-push-tourist" }, location.origin);
  } catch (e) {}
}

/** Nudge back-office sync when 视频页 is shown (route_site is always loaded — do not leave iframe on about:blank). */
function onVideoTabShown() {
  pingRouteSiteTouristPush();
  requestAnimationFrame(function () {
    pingRouteSiteTouristPush();
  });
  setTimeout(pingRouteSiteTouristPush, 400);
  setTimeout(pingRouteSiteTouristPush, 1200);
}

(function initRouteSiteFrame() {
  const iframe = document.getElementById("routeSiteFrame");
  const body = document.getElementById("videoHintBody");
  if (iframe) {
    iframe.src = buildRouteSiteIframeSrc();
    iframe.addEventListener("load", function orientaRouteSiteFirstLoad() {
      pingRouteSiteTouristPush();
      setTimeout(pingRouteSiteTouristPush, 500);
    });
  }
  if (body) {
    body.textContent =
      routeSiteAirport === "PEK"
        ? ""
        : "当前为旧金山 SFO T1 演示资源（视频与时间轴）。";
  }
})();

// Passenger profiles (mirror of passengerSim scenarios)
const PAX_DATA = {
  TX1:  { name: "SIYAO FU",        plan: "premium", inbound: "CA836←CDG", outbound: "CA783→CDG", gate: "E19", status: "At Risk" },
  TX2:  { name: "SOPHIE CHEN",     plan: "premium", inbound: "CA783←FRA", outbound: "CA903→CDG", gate: "E19", status: "Moving" },
  TX3:  { name: "YAN JIANG",       plan: "premium", inbound: "CA921←SYD", outbound: "CA837→CDG", gate: "E19", status: "At Risk" },
  P3:   { name: "Maria Rodriguez", plan: "premium", inbound: "CA901←NRT", outbound: "CA931→LAX", gate: "E11", status: "Moving (♿)" },
  P4:   { name: "Arjun Sharma",    plan: "free",    inbound: "CA836←LHR", outbound: "CA931→LAX", gate: "E11", status: "On Track" },
  P5:   { name: "Sophie Dupont",   plan: "free",    inbound: "CA856←FRA", outbound: "CA921→SYD", gate: "E14", status: "Shopping" },
  P6:   { name: "Omar Al-Said",    plan: "free",    inbound: "CA901←NRT", outbound: "CA861→SIN", gate: "E36", status: "Missed" },
  P13:  { name: "Lucas Martin",    plan: "free",    inbound: "CA921←SYD", outbound: "CA856→FRA", gate: "E16", status: "Moving" },
  P11:  { name: "Isabella Romano", plan: "premium", inbound: "CA902←ICN", outbound: "CA781→CDG", gate: "E22", status: "At Risk" },
};

let info = PAX_DATA[passengerId] || { name: passengerId, plan: "free", inbound: "—", outbound: "—", gate: "—", status: "—" };
// Allow /pax wrapper to override
const overrideName = params.get("name");
const overridePlan = params.get("plan");
if (overrideName) info = { ...info, name: overrideName };
if (overridePlan) info = { ...info, plan: overridePlan };
const isPremium = info.plan === "premium";

document.getElementById("paxName").textContent = info.name;
document.getElementById("paxSub").textContent  = `(${passengerId}) · ${isPremium ? "💎 Premium" : "Free"}`;
document.getElementById("premiumNote").textContent = isPremium
  ? "Premium: You can chat directly with an operator."
  : "Free: Assisted by AI agent.";

document.getElementById("infoInbound").textContent  = info.inbound;
document.getElementById("infoOutbound").textContent = info.outbound;
document.getElementById("infoGate").textContent     = info.gate;
document.getElementById("infoStatus").textContent   = info.status;
document.getElementById("infoStrip").style.display  = "flex";
if (isPremium) document.getElementById("inputArea").style.display = "flex";

// ─── WebSocket ─────────────────────────────────────────────────
let ws = null;
let reconnTimer = null;

// route_site iframe → live map on back office (same channel as spawn pax_trajectory)
window.addEventListener("message", function (ev) {
  if (ev.origin !== location.origin) return;
  const d = ev.data;
  if (!d || d.type !== "orienta-pax-trajectory") return;
  const sock = ws;
  if (!sock || sock.readyState !== WebSocket.OPEN) return;
  const pos = d.position;
  if (!pos || typeof pos.lat !== "number" || typeof pos.lng !== "number") return;
  let path = Array.isArray(d.path) ? d.path : [];
  if (!path.length) path = [{ lat: pos.lat, lng: pos.lng }];
  try {
    sock.send(JSON.stringify({
      type: "pax_trajectory",
      path: path,
      position: { lat: pos.lat, lng: pos.lng }
    }));
  } catch (e) {}
});

function wsUrl() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  return `${proto}://${location.host}/ws`;
}

function connect() {
  ws = new WebSocket(wsUrl());
  ws.onopen = () => {
    setOnline(true);
    ws.send(JSON.stringify({ type: "hello", role: "pax", tenantId, passengerId, displayName: info.name, plan: info.plan }));
    ws.send(JSON.stringify({ type: "chat_fetch", tenantId, passengerId }));

    if (spawnPoint) {
      ws.send(JSON.stringify({
        type: "pax_trajectory",
        path: [{ lat: spawnPoint.lat, lng: spawnPoint.lng }],
        position: { lat: spawnPoint.lat, lng: spawnPoint.lng },
      }));
    }

    // Optional: navigation request from /pax entry page
    const arr = params.get("arr") || params.get("arrival") || params.get("arrivalFlight");
    const dep = params.get("dep") || params.get("departure") || params.get("departureFlight");
    const q = params.get("q") || params.get("query");
    if (arr && dep) {
      ws.send(JSON.stringify({ type: "nav_request", tenantId, passengerId, kind: "transfer", arrivalFlight: arr, departureFlight: dep }));
    } else if (q) {
      ws.send(JSON.stringify({ type: "nav_request", tenantId, passengerId, kind: "nl", query: q }));
    }
  };
  ws.onclose = () => { setOnline(false); reconnTimer = setTimeout(connect, 1500); };
  ws.onerror = () => {};
  ws.onmessage = (ev) => {
    const m = (() => { try { return JSON.parse(ev.data); } catch { return null; } })();
    if (!m) return;
    if (m.type === "chat_msg")     handleChatMsg(m.message, true);
    if (m.type === "chat_history") { clearMsgs(); m.messages.forEach(msg => handleChatMsg(msg, false)); }
    if (m.type === "message")      showNotify(m.record.body, m.record.messageId);
    if (m.type === "loc_request")  showLocRequest();
  };
}

function setOnline(up) {
  document.getElementById("connDot").className = "dot" + (up ? " online" : "");
}

connect();

// ─── Messages ─────────────────────────────────────────────────
const msgs = document.getElementById("msgs");

function clearMsgs() {
  msgs.innerHTML = "";
}

function handleChatMsg(msg, scroll) {
  const isOwn = (msg.from === "pax");
  const side  = isOwn ? "right" : "left";
  const cls   = isOwn ? "pax" : msg.from; // admin / agent / system

  const div = document.createElement("div");
  div.className = `msg ${side}`;
  div.dataset.msgId = msg.id;

  const meta = document.createElement("div");
  meta.className = "msg-meta";
  const labels = { admin: "Operator", pax: "You", agent: "🤖 Orienta AI", system: "⚙️ System" };
  const t = new Date(msg.createdAt).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  meta.textContent = `${labels[msg.from] || msg.from} · ${t}`;

  const bubble = document.createElement("div");
  bubble.className = `bubble ${cls}`;
  bubble.textContent = msg.body;

  div.appendChild(meta);
  div.appendChild(bubble);
  msgs.appendChild(div);

  if (scroll) msgs.scrollTop = msgs.scrollHeight;

  // Send read receipt for operator messages
  if ((msg.from === "admin" || msg.from === "agent") && ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: "chat_read", tenantId, passengerId, messageId: msg.id, at: Date.now() }));
  }
}

function sendMsg() {
  const ta = document.getElementById("msgInput");
  const body = ta.value.trim();
  if (!body || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: "chat_send", tenantId, passengerId, body, kind: "text" }));
  ta.value = "";
}

// ─── Notifications ─────────────────────────────────────────────
function showNotify(body, messageId) {
  const container = document.getElementById("notifyBanners");
  const div = document.createElement("div");
  div.className = "notify-banner";
  div.innerHTML = `<span class="dismiss" onclick="this.parentElement.remove()">×</span>📨 ${body}`;
  container.appendChild(div);
  // Auto-dismiss after 8s
  setTimeout(() => { try { div.remove(); } catch {} }, 8000);
  // Send ack
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: "ack", tenantId, passengerId, messageId }));
  }
}

function showLocRequest() {
  showNotify("Orienta is requesting your current location. Please share it below.", "_loc_req_" + Date.now());
  document.getElementById("locBtn").style.background = "#ff9f0a";
  document.getElementById("locStatus").textContent = "⚠️ Location requested by operator";
}

// ─── Location ──────────────────────────────────────────────────
function shareLocation() {
  if (!navigator.geolocation) {
    alert("Geolocation not available in this browser.");
    return;
  }
  document.getElementById("locStatus").textContent = "Getting location…";
  const opts = { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 };
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude: lat, longitude: lng, accuracy } = pos.coords;
      const body = `📍 My location: ${lat.toFixed(6)}, ${lng.toFixed(6)}${accuracy ? ` (±${Math.round(accuracy)}m)` : ""}`;
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: "chat_send", tenantId, passengerId, body, kind: "location" }));
      }
      document.getElementById("locStatus").textContent = `Location shared: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      document.getElementById("locBtn").style.background = "#34c759";
    },
    (err) => {
      document.getElementById("locStatus").textContent = "Location error: " + err.message;
    },
    opts
  );
}

// ─── 对话 / 视频页 切换 ─────────────────────────────────────────
function setMainView(mode) {
  const chat = document.getElementById("panelChat");
  const video = document.getElementById("panelVideo");
  const tChat = document.getElementById("tabChat");
  const tVideo = document.getElementById("tabVideo");
  const isChat = mode === "chat";
  chat.style.display = isChat ? "flex" : "none";
  video.style.display = isChat ? "none" : "flex";
  tChat.classList.toggle("active", isChat);
  tVideo.classList.toggle("active", !isChat);
  tChat.setAttribute("aria-selected", isChat ? "true" : "false");
  tVideo.setAttribute("aria-selected", isChat ? "false" : "true");
  if (!isChat) onVideoTabShown();
}

document.getElementById("tabChat").addEventListener("click", function () { setMainView("chat"); });
document.getElementById("tabVideo").addEventListener("click", function () { setMainView("video"); });

const initialView = (params.get("view") || "chat").toLowerCase();
if (initialView === "video") setMainView("video");
</script>
</body>
</html>
