<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air China · 室内路线导航</title>
  <style>
    :root {
      --bg: #0b0b0c;
      --line: rgba(255, 255, 255, 0.1);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.55);
      --blue: #0a84ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; height: 100dvh; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    .shell { display: flex; flex-direction: column; height: 100%; height: 100dvh; }
    .top {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: #121214;
    }
    .brand-logo { height: 70px; width: auto; max-width: min(360px, 62vw); object-fit: contain; flex-shrink: 0; }
    .top-mid { flex: 1; min-width: 0; }
    .route-line { font-size: 14px; font-weight: 800; }
    .route-line .gate { color: var(--blue); }
    .hint { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.35; }
    .btn-back {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }
    .frame-wrap { flex: 1; min-height: 0; position: relative; }
    .frame-wrap iframe {
      position: absolute; inset: 0; width: 100%; height: 100%; border: none;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <img class="brand-logo" src="/airchina-logo.png" alt="Air China" />
      <button type="button" class="btn-back" id="backBtn">返回</button>
      <div class="top-mid">
        <div class="route-line" id="routeLine">抵达登机口 <span class="gate" id="fromG">—</span> → 出发登机口 <span class="gate" id="toG">—</span></div>
        <div class="hint" id="routeHint" hidden></div>
      </div>
    </div>
    <div class="frame-wrap">
      <iframe title="室内路线导航" id="routeFrame" src="about:blank"></iframe>
    </div>
  </div>
  <script>
    (function () {
      const sp = new URLSearchParams(location.search);
      const fromGateRaw = (sp.get("from") || sp.get("gateFrom") || "").trim();
      const toGateRaw = (sp.get("to") || sp.get("gateTo") || "").trim();
      const fromGate = fromGateRaw || "—";
      const toGate = toGateRaw || "—";
      const ret = sp.get("return");
      const ap = (sp.get("airport") || sp.get("hub") || "PEK").trim().toUpperCase();
      const tenantQ = (sp.get("tenant") || "airchina").trim();
      const paxQ = (sp.get("pax") || sp.get("pid") || "TX1").trim();
      const frame = document.getElementById("routeFrame");
      if (frame) {
        let frameSrc =
          "/route_site/index.html?airport=" +
          encodeURIComponent(ap) +
          "&tenant=" +
          encodeURIComponent(tenantQ) +
          "&pax=" +
          encodeURIComponent(paxQ);
        if (fromGateRaw && toGateRaw) {
          frameSrc +=
            "&from=" +
            encodeURIComponent(fromGateRaw) +
            "&to=" +
            encodeURIComponent(toGateRaw);
        }
        const pdrB = (sp.get("pdrBackend") || "").toString().trim();
        if (pdrB) {
          frameSrc += "&pdrBackend=" + encodeURIComponent(pdrB);
        }
        if (sp.get("pdrMapMatch") === "1") {
          frameSrc += "&pdrMapMatch=1";
        }
        frame.src = frameSrc;
      }
      const hint = document.getElementById("routeHint");
      if (hint) {
        if (ap === "PEK") {
          hint.textContent = "";
          hint.hidden = true;
        } else {
          hint.textContent = "旧金山 SFO T1 演示资源。";
          hint.hidden = false;
        }
      }
      document.getElementById("fromG").textContent = fromGate;
      document.getElementById("toG").textContent = toGate;
      document.getElementById("backBtn").addEventListener("click", function () {
        if (ret && ret.length > 0) {
          try {
            const u = new URL(ret, location.origin);
            if (u.origin === location.origin && (u.protocol === "http:" || u.protocol === "https:")) {
              location.href = u.pathname + (u.search || "") + (u.hash || "");
              return;
            }
          } catch (e) {}
        }
        history.back();
      });

      // Live PDR (PDR_AIRCHINA on phone, same pax id) → map inside route_site iframe
      var __paxAliasRv = { DA8X3: "TX1", DB5K7: "TX3", DC2N9: "TX2" };
      var __canonicalPaxRv = __paxAliasRv[String(paxQ || "").toUpperCase()] || paxQ;
      var __pdrWsRv = null;
      function __connectPdrRelayWsRv() {
        if (!__canonicalPaxRv) return;
        var proto = location.protocol === "https:" ? "wss" : "ws";
        var url = proto + "://" + location.host + "/ws";
        try {
          __pdrWsRv = new WebSocket(url);
        } catch (e) {
          return;
        }
        __pdrWsRv.onopen = function () {
          __pdrWsRv.send(
            JSON.stringify({
              type: "hello",
              role: "pax",
              tenantId: tenantQ,
              passengerId: __canonicalPaxRv,
            })
          );
        };
        __pdrWsRv.onmessage = function (ev) {
          var m = null;
          try {
            m = JSON.parse(ev.data);
          } catch (e) {
            return;
          }
          if (!m || m.passengerId !== __canonicalPaxRv) return;
          var frame = document.getElementById("routeFrame");
          if (!frame || !frame.contentWindow) return;
          if (m.type === "pax_trajectory" && m.position) {
            try {
              frame.contentWindow.postMessage(
                { type: "orienta-live-pdr-trajectory", path: m.path, position: m.position },
                location.origin
              );
            } catch (e2) {}
          }
          if (m.type === "pax_trajectory_clear") {
            try {
              frame.contentWindow.postMessage({ type: "orienta-live-pdr-clear" }, location.origin);
            } catch (e3) {}
          }
        };
        __pdrWsRv.onclose = function () {
          __pdrWsRv = null;
          setTimeout(__connectPdrRelayWsRv, 1500);
        };
        __pdrWsRv.onerror = function () {};
      }
      __connectPdrRelayWsRv();
    })();
  </script>
</body>
</html>
