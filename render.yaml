services:
  - type: web
    name: orienta
    runtime: node
    region: oregon
    plan: free

    buildCommand: bash scripts/render-build.sh
    startCommand: cd vite && npm run start

    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        generateValue: true
      # GitHub Release asset URL, e.g. https://github.com/OWNER/REPO/releases/download/TAG/pek_videoroute_E.MP4
      # See vite/public/route_site/README.txt
      - key: PEK_VIDEO_URL
        sync: false
