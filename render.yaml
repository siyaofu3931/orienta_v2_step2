# Repo root = orienta_v2_step2 (contains vite/, pdr-backend/, scripts/)

services:
  - type: web
    name: orienta
    runtime: node
    region: oregon
    plan: free
    rootDir: vite
    buildCommand: bash ../scripts/render-build.sh
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PDR_API_ORIGIN
        sync: false
      - key: PEK_VIDEO_URL
        sync: false

  - type: web
    name: orienta-pdr
    runtime: python
    region: oregon
    plan: free
    rootDir: pdr-backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python run.py
    healthCheckPath: /health
