services:
  - type: web
    name: orienta
    runtime: node
    region: oregon
    plan: free

    buildCommand: bash scripts/render-build.sh
    startCommand: cd vite && npm run start

    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        generateValue: true
      # Public Release asset — set here so builds get it even if Dashboard env is wrong/outdated.
      - key: PEK_VIDEO_URL
        value: https://github.com/siyaofu3931/orienta_v2_step2/releases/download/pek-video-1/pek_videoroute_E.MP4
